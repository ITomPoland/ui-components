<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split Text Preloader | ITOM Sketchbook</title>
  <link rel="stylesheet" href="../../../src/css/style.css" />
  <!-- PrismJS for Syntax Highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <a href="../../../" class="back-btn">← Back to Notebook</a>
    
    <div class="viewer-layout">
      <!-- Live Preview -->
      <div class="preview-section">
        <div class="preview-header">
          <h2>Live Preview</h2>
          <button class="replay-btn" onclick="const iframe = document.querySelector('.preview-iframe'); if(iframe.contentWindow){iframe.contentWindow.sessionStorage.clear()}; iframe.src += ''">Replay Animation</button>
        </div>
        <iframe class="preview-iframe" src="./preview.html"></iframe>
        
        <!-- Dynamic Settings Controls -->
        <div class="preview-controls">
          <div class="control-group">
            <label>Image Count: <span id="valImages">10</span></label>
            <input type="range" id="slideImages" min="1" max="10" step="1" value="10">
          </div>
          <div class="control-group">
            <label>Preloader Text</label>
            <input type="text" id="inputPreloaderText" value="ITOM" style="width:100%; padding: 6px; background: transparent; border: var(--stroke-width) solid var(--text-ink); color: var(--text-ink); font-family: var(--font-sketch); font-size: 1.1rem; border-radius: 6px; box-shadow: 2px 2px 0 var(--text-ink); box-sizing: border-box;">
          </div>
          <div class="control-group">
            <label>Hero Text</label>
            <input type="text" id="inputHeroText" value="HERO" style="width:100%; padding: 6px; background: transparent; border: var(--stroke-width) solid var(--text-ink); color: var(--text-ink); font-family: var(--font-sketch); font-size: 1.1rem; border-radius: 6px; box-shadow: 2px 2px 0 var(--text-ink); box-sizing: border-box;">
          </div>
          <div class="control-group">
            <label>Background Color</label>
            <div class="color-pickers">
              <div class="color-picker-item">
                <span class="color-label">BG Color</span>
                <input type="color" id="colorBg" value="#fafaf9">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Code Viewer -->
      <div class="code-section">
        <div class="code-tabs" >
          <div class="code-tab" data-target="readme">Tutorial</div>
          <div class="code-tab active" data-target="preloaderHtml">Preloader HTML</div>
          <div class="code-tab" data-target="heroHtml">Hero HTML</div>
          <div class="code-tab" data-target="preloaderCss">Preloader CSS</div>
          <div class="code-tab" data-target="heroCss">Hero CSS</div>
          <div class="code-tab" data-target="preloaderJs">Preloader JS</div>
          <div class="code-tab" data-target="heroJs">Hero JS</div>
          <div style="flex:1; min-width: 20px;"></div>
          <a id="gitRepoBtn" href="#" class="github-repo-btn" title="View Source on GitHub" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg></a><script>setTimeout(()=>{const b=document.getElementById("gitRepoBtn");if(b){const p=window.location.pathname;const c=p.includes("/components/")?p.split("/components/")[1].replace("/index.html","").replace(/\/$/,""):"";if(c){b.href="https://github.com/ITomPoland/ui-components/blob/master/components/"+c+"/README.md"}else{b.style.display="none"}}}, 100);</script>
          <button class="copy-btn" id="copyBtn">Copy Code</button>
        </div>
        <!-- Container for code -->
        <pre class="code-content" id="codeContainer"><code id="codeBlock" class="language-html">Loading...</code></pre>
        <!-- Container for rendered markdown -->
        <div class="markdown-content" id="markdownContainer" style="display: none; padding: 20px; overflow-y: auto; color: inherit;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./viewer.js"></script>
</body>
</html>
