<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Components by ITomPoland</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Creative UI Components</h1>
        <p>A new Vanilla JS component every Wednesday.</p>
        
        <div class="filter-container">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="button">Buttons</button>
          <button class="filter-btn" data-filter="scroll">Scroll</button>
          <button class="filter-btn" data-filter="text">Text Effects</button>
        </div>
      </header>
      
      <main>
        <section class="components-grid" id="componentsGrid">
          <!-- Components will be injected here via platform.js -->
        </section>
      </main>
    </div>
    
    <script type="module" src="/src/platform.js"></script>
  </body>
</html>
