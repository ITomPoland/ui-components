<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITOM Sketchbook - UI Components</title>
    <!-- Use relative paths so it works fine with Vite base config -->
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>
    
    <div id="app" class="book-scene">
      
      <div class="book">
        
        <!-- Book Cover -->
        <div class="cover">
          <div class="cover-content">
            <h1 class="cover-title">ITom UI</h1>
            <p class="cover-subtitle">Sketchbook Vol. 1</p>
            <div class="cover-instruction">Click to Open</div>
          </div>
        </div>

        <!-- Back to Grid Bookmark (Hidden initially) -->
        <div class="bookmarks-container" id="componentBookmarks" style="display: none; left: 10%;">
          <button class="bookmark active" id="btnBackToGrid">← Back to Notebook</button>
        </div>

        <!-- Bookmarks (Top Tabs) -->
        <div class="bookmarks-container" id="gridBookmarks">
          <button class="bookmark active" data-filter="all">Home</button>
          <button class="bookmark" data-filter="button">Buttons</button>
          <button class="bookmark" data-filter="preloader">Preloaders</button>
        </div>

        <!-- Left Base Page -->
        <div class="page base-left-page">
          <div class="notebook-margin-line"></div>
          <div class="page-content" id="leftPageContainer">
            <!-- Content injected here -->
          </div>
        </div>
        
        <!-- Right Base Page -->
        <div class="page base-right-page">
          <div class="notebook-margin-line"></div>
          <div class="page-content" id="rightPageContainer">
            <!-- Content injected here -->
          </div>
        </div>

        <!-- Flipping Page (Dynamically used for transitions) -->
        <div class="page flip-page" style="display: none;">
          <!-- Front Face -->
          <div class="page-face front">
            <div class="notebook-margin-line"></div>
            <div class="page-content" id="flipFrontContainer">
            </div>
          </div>
          
          <!-- Back Face -->
          <div class="page-face back">
            <div class="notebook-margin-line"></div>
            <div class="page-content" id="flipBackContainer">
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Templates -->
    <template id="about-page-template">
      <div class="about-page">
        <div class="about-header">
          <div class="avatar-container">
            <img src="./avatar.jpg" alt="ITom Avatar" style="width: 100%; height: 100%; object-fit: cover;" />
          </div>
          <div class="about-title-group">
            <h2 class="brand-title">ITOM UI</h2>
            <p class="brand-subtitle">&lt;component library /&gt;</p>
          </div>
        </div>

        <div class="about-mission">
          <h3 class="mission-title">Hello! 👋</h3>
          <p class="mission-text">
            I created this sketchbook to share my knowledge and passion for building UI components!
            <br><br>
            It is designed especially for <strong>beginners</strong> who want to learn how to build modern UI interactions from scratch, without relying on heavy frameworks.
            <br><br>
            Copy, paste, experiment, and let's learn together! 🚀
          </p>
        </div>

        <div class="about-actions">
          <div class="search-sticky-note">
            <input type="text" id="searchInput" placeholder="Search sketches..." autocomplete="off" />
          </div>

          <div class="sponsor-section">
            <p class="sponsor-text">Found it useful? Support my work with a tip! ☕</p>
            <a href="https://github.com/sponsors/ITomPoland" target="_blank" rel="noopener noreferrer" class="sponsor-btn">
              Sponsor 💖
            </a>
          </div>
        </div>
      </div>
    </template>
    
    <template id="grid-page-template">
      <h1 class="page-title"></h1>
      <section class="components-grid">
      </section>
    </template>
    
    <!-- SVG Filters for Squigglevision (Wiggly Sketch Effect) -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
      <defs>
        <filter id="squiggle-0">
          <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" result="noise" seed="0"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="squiggle-1">
          <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" result="noise" seed="1"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="squiggle-2">
          <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" result="noise" seed="2"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>
    
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
