version: 2
updates:
  # Maintain dependencies for npm (e.g., Vite, GSAP)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly" # Check for updates every week
    open-pull-requests-limit: 5

  # Maintain GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
